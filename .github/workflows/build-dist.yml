name: Build dist

# Runs on every push to main.
# Builds the package and force-commits dist/ back to the branch so that
# consumers installing via "github:THD-Spatial-AI/feedback-kit" get
# pre-built files without needing to run a build step themselves.
# dist/ stays gitignored for contributors — only this workflow commits it.

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Commit dist if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/
          git diff --staged --quiet || git commit -m "chore: build dist [skip ci]"
          git push
